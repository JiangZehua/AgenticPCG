  #   max_tokens: 128000

problems:
  - name: binary
    config: configs/default.yaml
  - name: binarydoor
    config: configs/binarydoor.yaml
  - name: zelda
    config: configs/zelda.yaml
  - name: sokoban
    config: configs/sokoban.yaml
  - name: smb
    config: configs/smb.yaml
  - name: loderunner
    config: configs/loderunner.yaml

tools:
