models:
  - name: gpt-4o-mini
    model: "@gpt-4o-mini-efbb71/gpt-4o-mini"
    max_tokens: 16384
  - name: o3-mini
    model: "@o3-mini-5791cb/o3-mini"
    max_tokens: 100000
  - name: gemini-2.5-pro
    model: "@vertexai/gemini-2.5-pro"
    max_tokens: 65536
  # - name: gemini-3-pro
  #   model: "@vertexai/gemini-3-pro-preview"
  #   max_tokens: 65536
  - name: gemini-3-flash
    model: "@vertexai/gemini-3-flash-preview"
    max_tokens: 65536
  # - name: claude-sonnet-4-6
