annealings:                     # Optimizer acceptance strategy (default: greedy if omitted)
  - name: greedy                # Standard hill-climbing (current default)
#   - name: greedy-eps05          # Greedy with 50% chance to accept worse
#     epsilon_accept_worse: 0.05
#   - name: sa-t10                # Simulated annealing T0=10
#     strategy: annealing
#     annealing_initial_temp: 10.0   # Starting temperature T0; T(t) = T0 * rate^t
#     annealing_decay_rate: 0.95     # Cooling factor per step
#   - name: sa-t05                # Simulated annealing T0=5 (more exploration)
#     strategy: annealing
#     annealing_initial_temp: 5.0
#     annealing_decay_rate: 0.80

conv_lengths:                    # Conversation history length (default: 1 if omitted)
  - name: "1"                    # No history (current turn only)
    conv_length: 1
#   - name: "2"                    # Keep 2 turns of history
#     conv_length: 2
  - name: "3"                    # Keep 3 turns of history
    conv_length: 3
#   - name: "4"                    # Keep 4 turns of history
#     conv_length: 4

experiments:
  - quality
  - diversity
  - controllability
