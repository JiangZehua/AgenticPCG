# make sure to have different NAME value to avoid same folder name for different run
defaults:
  provider: portkey
  num_trials: 10
  max_steps: 100
  max_workers: 30
  seed: 42
  render_stats: true
  debug: true

# --- Google Genai provider example (uses GOOGLE_API_KEY from .env) ---
